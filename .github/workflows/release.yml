name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x64
          - target: i686-pc-windows-msvc
            os: windows-latest
            name: windows-x86
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: windows-arm64
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x64
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            name: linux-arm7
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.os == 'ubuntu-latest' && (matrix.target == 'armv7-unknown-linux-gnueabihf' || matrix.target == 'aarch64-unknown-linux-gnu')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu
          rustup target add armv7-unknown-linux-gnueabihf aarch64-unknown-linux-gnu

      - name: Build (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux ARM)
        if: matrix.os == 'ubuntu-latest' && (matrix.target == 'armv7-unknown-linux-gnueabihf' || matrix.target == 'aarch64-unknown-linux-gnu')
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
          cross build --release --target ${{ matrix.target }}

      - name: Build (Windows/macOS)
        if: matrix.os != 'ubuntu-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXE_NAME="bokocli.exe"
          else
            EXE_NAME="bokocli"
          fi
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/$EXE_NAME artifact/ || true
          # Handle cases where cargo doesn't use target subdirectory on native builds
          if [ ! -f artifact/$EXE_NAME ]; then
            cp target/release/$EXE_NAME artifact/ 2>/dev/null || true
          fi
          # Create README
          echo "Boko Ebook Converter v${{ github.ref_name }}" > artifact/README.txt
          echo "Built for ${{ matrix.name }}" >> artifact/README.txt
          echo "Commit: ${{ github.sha }}" >> artifact/README.txt
          echo "Date: $(date -u)" >> artifact/README.txt

      - name: Create archive
        shell: bash
        run: |
          cd artifact
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../boko-${{ matrix.name }}.zip *
          else
            tar czf ../boko-${{ matrix.name }}.tar.gz *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: boko-${{ matrix.name }}
          path: boko-${{ matrix.name }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*/*
.*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
